ceholder), a two-sentence summary of what they receive, the specific pricing tier I am proposing with the price stated, a concise timeline from deposit to launch, a clear next steps section telling them exactly what to do to proceed, and a signature block with my name and Plato. Professional but warm, under 300 words, like a real person who cares about their specific business. Use [Restaurant Name] as the only placeholder."}, {"id": 73, "category": "Side Projects", "title": "Plato Project Timeline and Deliverables One-Pager", "prompt": "I run Plato, building restaurant websites in San Diego, and need a standard project timeline and deliverables document to include in proposals. Write a 14-day project timeline one-pager covering four phases: Phase 1 Discovery and Content Collection (days 1–3, what I need from them); Phase 2 Design and Development (days 4–9, what I am building); Phase 3 Review and Revisions (days 10–12, review rounds included); and Phase 4 Launch and Handoff (days 13–14, what happens at launch and what they receive). For each phase list 3–5 specific tasks or deliverables, who is responsible, and any dependencies. Include a callout box highlighting the three things clients most often delay — logo file, menu PDF, and photo assets — so they prepare these before Day 1."}, {"id": 74, "category": "Side Projects", "title": "Competitive Positioning vs. Squarespace and Wix", "prompt": "I run Plato, building restaurant websites in San Diego. My main competition in sales conversations is not other agencies but DIY platforms like Squarespace and Wix. Write: (1) a one-sentence positioning statement for Plato relative to Squarespace and Wix; (2) a side-by-side comparison table with five rows — Setup Time, Design Quality, Local Restaurant Expertise, Ongoing Owner Burden, and Restaurant-Specific Features — and three columns: Plato, Squarespace, and Wix, each cell in plain language a restaurant owner understands; and (3) two talking points for when an owner says 'I've heard Squarespace is pretty easy, why should I pay for Plato?' Each talking point should be 2–3 sentences ending with a specific Plato advantage. Format as positioning statement, table, and two labeled talking points."}, {"id": 75, "category": "Side Projects", "title": "First Plato Client Case Study Template", "prompt": "I run Plato, building restaurant websites in San Diego, and am completing my first client project. Write a case study template I can fill in with this client's details for my portfolio. Cover: Client and Context (restaurant type, size, location, prior web presence); The Problem (why they needed a new site); My Process (discovery, design, build, review, launch — 1–2 sentences per phase); What I Built (2–3 specific features addressing their core problem); The Outcome (metrics if available, otherwise qualitative impact); and a Testimonial Placeholder section. Write the template in portfolio webpage format with each section labeled and 2–4 sentences of guided placeholder content I replace with real details. Warm, professional, results-oriented voice."}, {"id": 76, "category": "Self-Reflection", "title": "Obsidian Daily Note Template — Full Morning and Evening Structure", "prompt": "I use Obsidian as my primary note-taking and journaling tool and want a daily note template I can use consistently. Generate a complete daily note template including: a date header in YYYY-MM-DD format, a Morning Intention section with 2–3 guided prompts, a Wins and Gratitude section with three bullet slots, a Challenges and Tensions section with a prompt to name one specific friction point, a Work Focus section for my top three tasks, a Job Search section for one specific search action for today, an Evening Reflection section with three questions (what worked, what did not, what I am carrying into tomorrow), and a Free Write section. Format in valid Obsidian markdown using callout blocks and H2 headers. After the template, add one sentence rationale per section."}, {"id": 77, "category": "Self-Reflection", "title": "Weekly Review Facilitation — 12 Questions Across Six Life Areas", "prompt": "I maintain a personal journaling practice in Obsidian and a physical bullet journal and do a structured weekly review every Sunday evening. Facilitate my weekly review with 12 questions — two for each of these six areas: Job Search Progress, Work and Team Management at Lazy Acres, Relationship with Ari, Physical Health (boxing and running), Personal Growth and Learning (SQL, Power BI, reading), and Mindset and Emotional Patterns. After each question include a blank line for my written answer. After all 12 questions, add a Themes and Patterns section with two prompts: one asking what theme appeared across multiple areas this week, and one asking what single action next week would have the greatest positive impact across multiple areas simultaneously. Format in Obsidian markdown with clear section headers."}, {"id": 78, "category": "Self-Reflection", "title": "Monthly Theme Identification — Five Options for My Current Moment", "prompt": "I practice setting a monthly theme — a focus word or phrase that guides my attention and intentions for the month. Based on my current life context, generate five potential monthly theme options. My context: active job search for HRIS and operations technology roles while studying for Power BI PL-300; managing a complex team situation at Lazy Acres including a challenging direct report; in a relationship with my partner Ari I want to invest in more intentionally; and doing reflection work connected to my fearful-avoidant attachment style and my 'Am I Wanted?' primal question pattern. For each theme provide: the theme word or phrase, a one-sentence explanation of why it fits now, one morning intention prompt, and one evening reflection question. Close with a recommendation for which theme to choose and why. Format as five labeled theme cards plus a recommendation."}, {"id": 79, "category": "Self-Reflection", "title": "IFS Parts Work — Anxious Job Search Avoidance", "prompt": "I practice Internal Family Systems (IFS) as a self-reflection framework. Facilitate a guided IFS parts work journaling session focused on the anxious, contracted feeling that shows up in my job search — the sensation that arises when I have not heard back from an application or when I notice myself avoiding sending outreach messages and defaulting to organizing my Obsidian vault instead. The session should include: an opening grounding check-in with two questions; identification of the part with prompts to describe where I feel it in my body, what it looks like, and what I might call it; getting curious with the part using 4–5 open questions; listening for what the part is protecting; a message from Self to the part; and a closing integration prompt. Format as a guided sequence with each section labeled and prompts in italics."}, {"id": 80, "category": "Self-Reflection", "title": "Fearful-Avoidant Pattern Identification in a Recent Interaction", "prompt": "I have a fearful-avoidant attachment style and notice this pattern in professional relationships, in my job search, and in some moments with my partner Ari. Walk me through a five-part journaling exercise for identifying fearful-avoidant activation in a specific recent interaction: (1) describe the interaction factually without interpretation; (2) identify the specific moment the shift happened — when did I want to pull back, go quiet, or over-explain?; (3) name the underlying fear or perceived threat that was activated; (4) identify the behavioral response I chose and what I wish I had done instead; and (5) write one sentence representing what my secure self would have said or done. Close with a prompt: what is this pattern protecting and what does it cost me? Format as five labeled journaling sections with a closing prompt."}, {"id": 81, "category": "Self-Reflection", "title": "Am I Wanted? Primal Question Journaling Session", "prompt": "I have been working with a personal growth framework from a book called Primal Questions that identifies core emotional questions driving our patterns — mine is 'Am I Wanted?' This question surfaces in my job search, in my relationship with Ari, in team dynamics at Lazy Acres, and in how I interpret silence or lack of response from others. Write a structured journaling session titled 'Am I Wanted? — A Working Through' with five sections: (1) identify three recent situations where this question was activated even subtly; (2) explore what 'being wanted' specifically means to me — what would it look like, feel like, and prove?; (3) examine one situation where I assumed I was not wanted but may have been misreading the signal; (4) explore what I would do differently if I operated from the assumption that I am wanted by default; and (5) a closing integration prompt. Format as a guided sequence with labeled sections."}, {"id": 82, "category": "Self-Reflection", "title": "Values Clarification Exercise — Three-Part Facilitated Session", "prompt": "I want to do a values clarification exercise to reconnect with what I actually care about versus what I think I should care about. My context: I am in a career transition from food service operations into HRIS and technology roles, I live in San Diego with my partner Ari and our dog Bagel, and I engage in boxing, running, cooking, guitar, photography, journaling, and Hearthstone. Facilitate a three-part values clarification exercise: Part 1 presents me with 20 value words and asks me to identify my top 7 without overthinking; Part 2 takes my stated top 7 and asks three distinguishing questions per value to separate genuinely core values from externally conditioned ones; Part 3 guides me in writing a 3–4 sentence values statement integrating my confirmed top three values into a usable north star. Write all three parts now as a complete facilitated sequence."}, {"id": 83, "category": "Self-Reflection", "title": "Behavioral Pattern Recognition Exercise on a Journal Entry", "prompt": "I journal regularly in Obsidian and want to develop the habit of recognizing behavioral patterns across my entries rather than just recording individual events. Teach me how to do a behavioral pattern recognition exercise. First explain the methodology in 3–4 sentences. Then walk me through it using this representative journal entry written in my voice: 'Didn't send the outreach messages I planned to send today. Spent 45 minutes updating my Obsidian vault instead. Felt a vague sense of dread when I opened my inbox. Told myself tomorrow will be better. Went to the gym and had a solid boxing session — that part felt good. Finished the evening watching two hours of Hearthstone streams instead of working on the portfolio case study I said I would finish this week.' Identify three behavioral patterns present, name each one, explain what it might be signaling, and suggest one reflection question to investigate each further."}, {"id": 84, "category": "Self-Reflection", "title": "Reframe a Job Rejection Through Attachment Lens", "prompt": "I recently received a rejection after reaching a late interview stage for an HRIS Analyst role and want to process it through the lens of my fearful-avoidant attachment style rather than catastrophizing or dismissing. Write a guided journaling session in five parts: Part 1 Grounding — the facts of what happened without interpretation; Part 2 The Story I Am Telling — what narrative did I immediately construct and is it accurate?; Part 3 Attachment Activation — did I feel rejected as a person or in a professional context, and what is the difference?; Part 4 Evidence Audit — three pieces of concrete evidence that contradict the rejection narrative; Part 5 Integration — one honest grounded statement about what this experience actually means, and one specific action I will take in the next 24 hours that reflects genuine belief in my own value. Format as five labeled journaling sections."}, {"id": 85, "category": "Self-Reflection", "title": "Temporal Discounting Check-In — Job Search and Personal Life", "prompt": "I am familiar with temporal discounting — the bias to overvalue immediate rewards and undervalue future ones — and recognize it in my job search behavior, where I avoid the discomfort of outreach in favor of lower-stakes tasks. Facilitate a structured temporal discounting check-in in four parts: Part 1 presents two prompts to identify one area in my job search and one in my personal life where temporal discounting is currently active; Part 2 walks me through a 10/10/10 reframe for each identified area — how will I feel about this choice in 10 minutes, 10 months, and 10 years?; Part 3 writes one if-then implementation intention for each area; and Part 4 closes with one grounding question reconnecting me to why the future-oriented choice matters to me personally. Format as four labeled journaling sections."}, {"id": 86, "category": "Self-Reflection", "title": "Relationship Communication Debrief with Ari", "prompt": "I want to do a structured communication debrief after a conversation with my partner Ari where I did not show up the way I wanted to. My growth edge in relationships is moving from over-explaining or going quiet under stress toward authentic, grounded communication — especially when I feel unseen or suspect Ari is frustrated. Write a guided five-part relationship communication debrief for my Obsidian journal: Part 1 describe the conversation factually — what was said and what I noticed in myself; Part 2 identify the moment I shut down, deflected, or over-explained; Part 3 what was the underlying need I had that I did not express directly?; Part 4 write what I wish I had said — not the right answer, just the honest one; Part 5 write a brief plan for a follow-up conversation with Ari. Close with a prompt about what secure communication looks like for me. Five labeled sections."}, {"id": 87, "category": "Self-Reflection", "title": "Processing Workplace Friction — Team Management Stress", "prompt": "I am a Department Manager at Lazy Acres Natural Market managing a 40+ person team including an ongoing personnel situation involving performance documentation and communication friction with a direct report. The stress of managing team conflict while job searching and studying for certifications creates background tension I carry into evenings. I want to process this through journaling rather than letting it compound. Write a four-part workplace friction processing journaling session: Part 1 Decompress — two prompts to externalize the stress factually without judgment or problem-solving; Part 2 Separate the Solvable from the Unsolvable — identify what is within my control and what is not; Part 3 The Hidden Cost — how is this friction showing up in my job search energy, relationship with Ari, and physical health?; Part 4 One Grounded Action — the single most useful thing I can do about this tomorrow, and the single most important thing I can let go of tonight. Four labeled journaling sections."}, {"id": 88, "category": "Self-Reflection", "title": "Career Identity Journaling — Caught Between Two Worlds", "prompt": "I am in a career transition from food service operations management into HRIS and technology roles. My sense of professional identity is caught between two places — I am still a Department Manager at Lazy Acres but no longer fully identify with that role as my future self. Write a five-part career identity journaling session: Part 1 Who am I professionally right now — 3-sentence honest description including the parts that feel stuck; Part 2 Who am I becoming — 3-sentence aspirational description of the professional I am moving toward in the HRIS and operations technology space; Part 3 The Bridge — what specific things I am already doing that prove the transition is real (certifications, portfolio, tools built, Plato); Part 4 The Dissonance — what part of my current identity is hardest to let go of and why; Part 5 write a one-sentence professional identity statement for who I am becoming. Format as five labeled journaling sections."}, {"id": 89, "category": "Self-Reflection", "title": "Specificity-Based Gratitude Practice — Three-Round Journaling", "prompt": "I want to develop a more specific and meaningful gratitude practice. My current habit tends toward generic entries — 'I am grateful for my health, my relationship, my job' — and I want to go deeper by anchoring gratitude to specific moments, sensory details, and people. Walk me through a specificity-based gratitude journaling practice in three rounds. Round 1 asks three questions designed to surface a specific moment from the last 24 hours — not a category but one concrete moment involving a person, a feeling, or a specific experience. Round 2 asks me to describe that moment in full sensory detail and identify which personal need of mine was met in it. Round 3 asks me to write a brief gratitude statement I could say to the person involved if there was one, and explore what it would feel like to actually tell them. Write all three rounds as a facilitated sequence with prompts in italics."}, {"id": 90, "category": "Self-Reflection", "title": "End-of-Week Self-Assessment — Five-Section Honest Review", "prompt": "I want to do an honest end-of-week self-assessment that goes beyond a productivity review and looks at how I actually showed up. Write a structured assessment in five sections: Section 1 Integrity Check — three yes/no questions asking whether I did what I said I would do this week in job search actions, skill-building, and team management; Section 2 Energy Report — two prompts asking where I gave my best energy and where I showed up noticeably depleted; Section 3 Relationship Quality — two prompts about my quality of presence with Ari and with my team at Lazy Acres; Section 4 Learning and Growth — one prompt about what I learned from SQL study, Power BI work, or a difficult situation, and one about a belief I want to challenge next week; Section 5 Next Week's Non-Negotiable — the single most important action I will take, and the emotional state I intend to bring to Monday morning. Five labeled sections with prompts in italics."}, {"id": 91, "category": "Productivity", "title": "Obsidian Vault Structure — Job Search, Work, Plato, and Personal Life", "prompt": "I use Obsidian as my primary knowledge management tool and want a vault structure supporting my job search, work at Lazy Acres Natural Market, Plato side project, certifications (Power BI PL-300 and SQL), and personal journaling and reflection practice. Design a complete vault folder structure with no more than seven root folders, logical subfolders, and naming conventions that stay scannable at a glance. Format as an indented list, then explain the organizing principle in 2–3 sentences. List five templates I should create immediately with a description of what each should contain. Suggest three Obsidian plugins that would meaningfully improve this vault for job search tracking, daily journaling, and project management, with one sentence of explanation per plugin. Format as three clearly labeled sections."}, {"id": 92, "category": "Productivity", "title": "Job Search Map of Content (MOC) — Obsidian", "prompt": "I use Obsidian as my primary knowledge management tool and want to create a Map of Content for my job search — a hub note linking to all related notes providing a navigable overview. Create a complete Job Search MOC template with wiki-link sections for: Target Companies (Dayforce/Ceridian, UKG, Deputy, Toast, When I Work, Harri, Infor), Role Research (HRIS Analyst, WFM Specialist, Ops Tech), Application Tracker, Interview Prep, Resume Versions, Cover Letter Templates, Networking Contacts, and Weekly Sprint Logs. For each section write 1–2 sentences describing what notes live there and what to update weekly. At the top include a Status Dashboard with fields for Total Applications, Active Interviews, Current Focus, and This Week's Priority. Write the full MOC in valid Obsidian markdown with H2 headers and double-bracket wiki-links."}, {"id": 93, "category": "Productivity", "title": "Bullet Journal Weekly Spread Design", "prompt": "I use a physical bullet journal alongside Obsidian and want a weekly spread design that complements my digital system rather than duplicating it. Design a weekly spread for a standard two-page dot-grid format including: a weekly intention header top of left page; a day-by-day planning grid spanning both pages (Mon–Wed left, Thu–Sun right); a Job Search Tracker box for applications sent, outreach messages, responses, and interviews scheduled; a Skill-Building Log box with checkboxes for Power BI PL-300 and SQL study sessions; a Plato Progress box for demo builds and client conversations; a four-to-five item habit tracker row; and a Weekly Capture box for ideas destined for Obsidian. For each section describe its approximate size in grid squares, its position on the spread, and the exact fields or bullet points it contains. Format as a layout description I can follow while drawing the spread."}, {"id": 94, "category": "Productivity", "title": "Implementation Intentions for PL-300 Study Habit", "prompt": "I am studying for the Microsoft Power BI PL-300 certification via Coursera while working full-time as a Department Manager at Lazy Acres Natural Market on rotating opening and closing shifts, running an active job search, and managing the Plato side project. Write five implementation intentions for my PL-300 study habit in the format 'If/when [situation], then I will [specific behavior] for [duration or specific action].' Each should be concrete, anchored to a specific daily trigger already in my routine such as arriving home, making morning coffee, or opening my laptop, and realistic for both opening shift and closing shift days. After the five statements, write one paragraph explaining the behavioral science of why implementation intentions outperform simple goal-setting for people with irregular work schedules. Format as five numbered if-then statements followed by the explanation paragraph."}, {"id": 95, "category": "Productivity", "title": "Temporal Discounting Reframe — Break LinkedIn Outreach Avoidance Today", "prompt": "I experience temporal discounting around sending LinkedIn outreach messages and cold emails for my job search. Each day I delay this task I tell myself I will do it tomorrow when I feel more ready or confident. Use the temporal discounting reframe technique to help me act on this specific task today. Structure the reframe in four steps written in second person directly addressing me: (1) name the immediate cost I am paying right now in the present moment by avoiding this task — not the future cost, the now cost; (2) project forward 90 days and describe the cumulative impact of continuing to avoid this for 90 more days as a vivid specific scenario; (3) make the future reward concrete — describe one specific positive outcome that becomes possible if I complete five outreach messages today, in vivid and specific terms; and (4) give me a micro-commitment I can make in the next five minutes to break the inertia right now."}, {"id": 96, "category": "Productivity", "title": "Second-Brain Capture Workflow — Phone, Laptop, and Bullet Journal", "prompt": "I use a second-brain approach to capture information I encounter — insights from Hard Fork and Practical AI podcasts, HRIS and WFM technology articles, job search learnings, and Plato ideas — but my capture workflow is inconsistent and things get lost between my phone, laptop, and bullet journal. Design a frictionless capture workflow for three contexts: (1) on my phone during commute or at work (fast and frictionless); (2) at my laptop in the evening with time for deeper processing; and (3) in my bullet journal during morning or evening rituals. For each context specify: which capture tool I should use from my existing apps, the exact form the capture takes, when and how it gets processed into Obsidian, and one rule that prevents the system from becoming a new source of cognitive load. Format as three labeled context blocks."}, {"id": 97, "category": "Productivity", "title": "Two-Week Job Search Sprint Plan", "prompt": "I want to run a focused two-week job search sprint starting this coming Monday with the goal of advancing at least one application to interview stage and expanding my active pipeline from three to eight open applications. I work full-time as a Department Manager at Lazy Acres National Market on rotating shifts and want to protect time for Plato and Power BI PL-300 study. Create a two-week project plan covering: Sprint Goal and Success Criteria, Week 1 Daily Actions (specific task per day Mon–Sun with realistic time estimate), Week 2 Daily Actions (specific task per day Mon–Sun with time estimate), and a definition of the five highest-priority applications to send in Week 1 based on my background. Format as a structured plan with clearly labeled phases and a daily task table for each week."}, {"id": 98, "category": "Productivity", "title": "Daily Shutdown Ritual Script — 10 to 15 Minutes", "prompt": "I want a consistent daily shutdown ritual that closes out the workday at Lazy Acres Natural Market, transitions me into job search or personal time, and prevents work stress from bleeding into evenings with Ari and time for boxing, guitar, and personal development. Write a daily shutdown ritual script I can complete in 10–15 minutes including: a task capture step for anything unfinished or top-of-mind from work; a review step checking my bullet journal for what I said I would do today; an acknowledgment step naming one specific thing I did well; a transition step with a physical or environmental cue that signals the workday is ending; a job search check for one 3-minute task to advance my search; and an evening intention step naming one meaningful activity I will prioritize tonight. Write as a numbered script with timing for each step and a brief note on why that step matters. Format as a numbered ritual script."}, {"id": 99, "category": "Productivity", "title": "Obsidian Tag Taxonomy — Two-Level System", "prompt": "I use Obsidian as my personal knowledge management system and want a tag taxonomy that is useful without becoming a maintenance burden. My main use areas are: job search and career pivot, work operations at Lazy Acres, Plato side project, certifications and skill-building (Power BI PL-300 and SQL), self-reflection and journaling, personal productivity, and creative interests (boxing, guitar, photography, cooking). Design a two-level tag taxonomy with no more than eight top-level tags in #tag format, logical child tags in #parent/child format, and a rule for when to use tags versus folders. Present the full taxonomy as an indented list. Add three usage guidelines that will keep the system maintainable over time: when to add a new tag, when to merge tags, and when to delete or archive tags. Format as the taxonomy list followed by the three guidelines."}, {"id": 100, "category": "Productivity", "title": "Weekly Priority Triage Process — 20-Minute Sunday Routine", "prompt": "I manage competing priorities across my job at Lazy Acres National Market (opening and closing shifts, team management, P&L), job search (applications, outreach, interviews), Power BI PL-300 certification study, Plato side project, and personal wellbeing. I want a repeatable 20-minute weekly priority triage I can run every Sunday evening to determine my top three priorities for the coming week. Write the triage framework covering: a brain dump step to get everything out of my head; a sorting step using a simple 2x2 matrix with four labeled quadrants and examples of what types of tasks from my life live in each; a selection step with rules for picking my top three weekly priorities from the matrix; and a constraint check with three questions confirming my top three are actually achievable given my shift schedule and energy. Format as a step-by-step triage process with each step labeled and timed."}, {"id": 101, "category": "Productivity", "title": "Energy-Based Task Scheduling — Opening Shift vs. Closing Shift Versions", "prompt": "My cognitive energy varies significantly by shift type at Lazy Acres National Market. On opening shifts starting at 5–6 AM I have high energy in the morning and crash by mid-afternoon. On closing shifts ending at 9–10 PM I have low energy in the morning and peak performance in the afternoon and evening. Design an energy-based task scheduling guide with two versions: Version A for opening shift days and Version B for closing shift days. For each version provide a timeline from wake-up to bedtime with three to four labeled energy blocks (Peak, Moderate, Low, Wind-Down), the types of tasks most suited to each block drawn from my actual categories (job search strategy, SQL study, cover letter writing, email, Obsidian capture, LinkedIn browsing), and one anti-pattern I should avoid in each energy state. Format as two labeled schedules with a brief introduction."}, {"id": 102, "category": "Productivity", "title": "Habit Stack Design — Anchor Habits Linked to New Behaviors", "prompt": "I want to design a habit stack connecting my existing daily anchors to the new habits I am building: daily SQL or Power BI study, a daily job search action, daily journaling, and consistent sleep timing. My current anchors are morning coffee, post-boxing or post-run shower, arriving home from Lazy Acres, and evening wind-down. Design a complete habit stack system with: the four anchor habits described briefly, one new habit stacked onto each anchor chosen from my target habit list, a written habit stack statement for each in 'After I [anchor], I will [new habit], for [duration]' format, and a troubleshooting note for each stack identifying the most likely failure mode and one protection against it. Close with a brief paragraph on how to evaluate the system after two weeks and what signals indicate I should adjust the design. Format as four labeled habit stacks followed by the evaluation paragraph."}, {"id": 103, "category": "Productivity", "title": "Reduce Morning Decision Fatigue — Two Protocols for Two Shift Types", "prompt": "I experience decision fatigue in my morning routine especially on opening shift days at Lazy Acres, leading to too long deciding what to work on, immediate phone checking after waking up, and inconsistent habit execution. Design standardized morning routine protocols for two scenarios. Scenario A: Opening shift day (wake-up 4:30–5:00 AM, limited time before leaving for work). Scenario B: Day off or closing shift day (no morning time constraint). For each scenario design a routine that requires zero decisions to start (the first action is predetermined), has a maximum of five steps, completes in 30 minutes or less for Scenario A and 60 minutes or less for Scenario B, includes a job search touch and a brief journaling moment, and ends with a clear transition signal. Write each as a numbered step-by-step protocol with timing. Format as two labeled protocols."}, {"id": 104, "category": "Productivity", "title": "Obsidian and Bullet Journal Integration Protocol", "prompt": "I use Obsidian for digital notes and knowledge management and a physical bullet journal for daily planning, capture, and ritual. I want these two systems to be a coherent whole rather than competing systems. Design an integration protocol defining the role of each system and the handoff between them. Cover: the division of responsibilities (what lives in Obsidian vs. the bullet journal with a rule for edge cases), the daily sync workflow (one brief step morning and one evening to keep systems aligned), the weekly consolidation process (how I move bullet journal captures into Obsidian on Sundays), the specific note types that always live in Obsidian (evergreen notes, project MOCs, case studies, templates), and the specific captures that always stay in the bullet journal (daily logs, habit tracking, fleeting notes, weekly spreads). Format as a protocol document with clearly labeled sections and a one-sentence decision rule for each section."}, {"id": 105, "category": "Productivity", "title": "Quarterly Review Template — Eight Life Areas", "prompt": "I want a structured quarterly review template I can use in Obsidian every 90 days covering eight life areas: Career and Job Search, Skill-Building and Certifications (Power BI PL-300 and SQL), Work at Lazy Acres (department performance, team health), Plato Side Project, Relationship with Ari, Physical Health (boxing and running), Personal Growth and Self-Reflection, and Financial and Career Planning. Write a complete quarterly review template including: a Quarter in Review header with date and quarter number; a Wins section (3–5 most significant wins across all areas); a Challenges section (3 most significant difficulties with one learning from each); an Area-by-Area Assessment (one paragraph per life area rated 1–10 with a one-sentence score explanation); a Themes and Patterns section (two patterns when looking at the quarter as a whole); a Next Quarter Intentions section (one specific goal per area as an implementation intention); and a one-sentence statement of the quarter's defining theme. Write the full template in Obsidian markdown with headers and placeholder prompts in italics."}];

/* ─── STATE ─────────────────────────────────────────────────────────── */
let activeCategory = "All";
let searchQuery = "";

/* ─── DARK MODE ────────────────────────────────────────────────────── */
const html = document.documentElement;
const themeBtn = document.getElementById("theme-toggle");
const moonIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const sunIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

function isDark() {
  if (html.dataset.theme === "dark") return true;
  if (html.dataset.theme === "light") return false;
  return window.matchMedia("(prefers-color-scheme: dark)").matches;
}
function syncThemeIcon() {
  themeBtn.innerHTML = isDark() ? sunIcon : moonIcon;
  themeBtn.setAttribute("aria-label", isDark() ? "Switch to light mode" : "Switch to dark mode");
}
themeBtn.addEventListener("click", () => {
  const going = isDark() ? "light" : "dark";
  html.setAttribute("data-theme", going);
  syncThemeIcon();
});
syncThemeIcon();
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", syncThemeIcon);

/* ─── NAV SCROLL ───────────────────────────────────────────────────── */
const navBar = document.getElementById("nav-bar");
const sentinel = document.getElementById("large-title-sentinel");
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    navBar.classList.toggle("scrolled", !e.isIntersecting);
  });
}, { rootMargin: "-44px 0px 0px 0px", threshold: 0 });
io.observe(sentinel);

/* ─── SEARCH FOCUS ─────────────────────────────────────────────────── */
const searchWrap = document.getElementById("search-bar-wrap");
const searchEl = document.getElementById("search");
const cancelBtn = document.getElementById("search-cancel");
searchEl.addEventListener("focus", () => searchWrap.classList.add("active"));
cancelBtn.addEventListener("click", () => {
  searchEl.value = "";
  searchQuery = "";
  searchWrap.classList.remove("active");
  searchEl.blur();
  renderTabs();
  renderGrid();
});

/* ─── HELPERS ──────────────────────────────────────────────────────── */
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function getFiltered() {
  return prompts.filter(p => {
    const mc = activeCategory === "All" || p.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const ms = !q || p.title.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q);
    return mc && ms;
  });
}
function countForCat(cat) {
  const q = searchQuery.toLowerCase();
  return prompts.filter(p => {
    const mc = cat === "All" || p.category === cat;
    const ms = !q || p.title.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q);
    return mc && ms;
  }).length;
}

/* ─── RENDER TABS ──────────────────────────────────────────────────── */
function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  const cats = ["All", ...Object.keys(CAT_COLORS)];
  cats.forEach(cat => {
    const count = countForCat(cat);
    const tab = document.createElement("button");
    tab.className = "tab" + (cat === activeCategory ? " active" : "");
    tab.textContent = cat === "All" ? `All (${count})` : `${cat} (${count})`;
    tab.setAttribute("role", "tab");
    tab.setAttribute("aria-selected", cat === activeCategory ? "true" : "false");
    tab.setAttribute("aria-label", `Filter by ${cat}, ${count} prompts`);
    if (cat !== activeCategory && cat !== "All") {
      tab.style.setProperty("--tab-color", CAT_COLORS[cat]);
    }
    tab.addEventListener("click", () => {
      activeCategory = cat;
      renderTabs();
      renderGrid();
    });
    tabsEl.appendChild(tab);
  });
}

/* ─── RENDER GRID ──────────────────────────────────────────────────── */
function renderGrid() {
  const filtered = getFiltered();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  grid.querySelectorAll(".card").forEach(c => c.remove());
  document.getElementById("count").textContent = `${filtered.length} of ${prompts.length}`;
  if (filtered.length === 0) {
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  filtered.forEach((p, i) => {
    const color = CAT_COLORS[p.category];
    const card = document.createElement("article");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 30, 300)}ms`;

    const pill = document.createElement("span");
    pill.className = "pill";
    pill.textContent = p.category;
    pill.style.backgroundColor = hexToRgba(color, 0.14);
    pill.style.color = color;

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = p.title;

    const body = document.createElement("div");
    body.className = "card-body";
    body.textContent = p.prompt;

    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.setAttribute("aria-label", `Copy prompt: ${p.title}`);
    btn.textContent = "Copy";
    btn.addEventListener("click", () => {
      const done = () => {
        btn.textContent = "✓ Copied";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(p.prompt).then(done).catch(() => { fallback(p.prompt); done(); });
      } else { fallback(p.prompt); done(); }
    });

    card.appendChild(pill);
    card.appendChild(title);
    card.appendChild(body);
    card.appendChild(btn);
    grid.appendChild(card);
  });
}

/* ─── FALLBACK COPY ────────────────────────────────────────────────── */
function fallback(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
}

/* ─── SEARCH INPUT ─────────────────────────────────────────────────── */
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderTabs();
  renderGrid();
});

/* ─── INIT ─────────────────────────────────────────────────────────── */
renderTabs();
renderGrid();
</script>
